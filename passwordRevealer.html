<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Revealer</title>

    <style>
        P {
            font-size: 50px;
            text-align: center;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        input {
            width: 200px;
            height: 100x;
        }
    </style>
</head>

<body>

    <p>MINI PROJECT #5</p>

    <div class="input-container">
        <input type="password" id="pass-field" value="Admin123">
        <button id="btn-show">show</button>
    </div>

    <script>
        const btnVisibility = document.querySelector("#btn-show");
        const passInput = document.querySelector("#pass-field");

        btnVisibility.addEventListener("click", function () {
           if (passInput.type === "password"){
            btnVisibility.textContent = "Hide";
            passInput.type= "text";
           }
           else{
            btnVisibility.textContent = "Show";
            passInput.type= "password";
           }

        })
    </script>

</body>

</html>
