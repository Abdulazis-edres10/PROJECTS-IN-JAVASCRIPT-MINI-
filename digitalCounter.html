<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DIGITAL COUNTER</title>

    <style>
        P{
            font-size: 50px;
            text-align: center;
        }
        h1{
            text-align: center;
            font-size: 120px;  
            /* display: flex; */
            align-items: center;
            /* justify-content: center; */
        }
       body {
        height: 100vh;            
        display: flex;       
        flex-direction: column;      
        justify-content: center;  
        align-items: center;      
        background-color: rgb(197, 147, 147);
        }

        button {
        font-size: 20px;
        width: 150px;      
        height: 50px;
        gap: 10px;
        display: flex;
        margin: 20px;
        align-items: center;
        justify-content: center;
        }
    </style>
</head>
<body>
    <p>
         MINI PROJECT #2
    </p>
    <h1 id="count">
        0
    </h1>
    <div id="btn">
    <button class="btn-decrease">-</button>
    <button class="btn-increase">+</button>
    <button class="btn-reset">Reset</button>
    </div>
    

    <script>
        let count = 0;
        
        const bttn = document.querySelector('#btn');
        const display = document.querySelector('#count');

            function updateCount(){
                display.textContent = count;
            }
        bttn.addEventListener("click", function(e){
            // console.log(btn)
            if (e.target.classList.contains('btn-decrease')){
                count--;
                updateCount();
            }else if (e.target.classList.contains('btn-increase')){
                count++;
                updateCount();
            }else if (e.target.classList.contains('btn-reset')){
                count = 0;
                updateCount()
            }

        });



    </script>
</body>
</html>
